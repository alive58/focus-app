<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي التركيز العميق</title>
    <style>
        :root { --bg: #0f172a; --primary: #06b6d4; --danger: #ef4444; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e293b; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 85%; max-width: 400px; }
        #timer { font-size: 5rem; font-weight: bold; margin: 1rem 0; color: var(--primary); }
        button { background: var(--primary); border: none; padding: 1rem 2rem; border-radius: 50px; color: white; font-size: 1.2rem; cursor: pointer; width: 100%; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        .stats { margin-top: 1.5rem; font-size: 0.9rem; color: #94a3b8; }
        input { background: #334155; border: 1px solid #475569; color: white; padding: 0.5rem; border-radius: 10px; width: 80%; margin-bottom: 1rem; text-align: center; }
        .settings { margin-top: 1rem; font-size: 0.8rem; border-top: 1px solid #334155; padding-top: 1rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎯 تحدي التركيز</h2>
    <div id="timer">05:00</div>
    
    <input type="number" id="customTime" placeholder="أدخل الدقائق يدوياً">
    <button id="startBtn">ابدأ التحدي</button>

    <div class="stats">
        <div>إجمالي وقت الدراسة: <span id="totalStudy">0</span> دقيقة</div>
        <div>المخالفات: <span id="violations" style="color: var(--danger);">0</span></div>
    </div>

    <div class="settings">
        <details>
            <summary>⚙️ إعدادات تليجرام</summary>
            <input type="text" id="token" placeholder="Bot Token">
            <input type="text" id="chatId" placeholder="Chat ID">
        </details>
    </div>
</div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop></audio>

<script>
    let timerDisplay = document.getElementById('timer');
    let startBtn = document.getElementById('startBtn');
    let alarm = document.getElementById('alarm');
    let isRunning = false;
    let secondsLeft = 300;
    let totalMinutes = localStorage.getItem('totalStudy') || 0;
    let violations = 0;
    let interval;

    document.getElementById('totalStudy').innerText = totalMinutes;

    startBtn.onclick = () => {
        if (!isRunning) {
            let custom = document.getElementById('customTime').value;
            if(custom) secondsLeft = custom * 60;
            
            // طلب إذن الحساسات للأندرويد/آيفون
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission();
            }
            
            startChallenge();
        } else {
            stopChallenge();
        }
    };

    function startChallenge() {
        isRunning = true;
        startBtn.innerText = "إيقاف";
        startBtn.style.background = "#ef4444";
        
        interval = setInterval(() => {
            secondsLeft--;
            updateDisplay();
            if (secondsLeft <= 0) {
                completeChallenge();
            }
        }, 1000);

        window.addEventListener('devicemotion', handleMotion);
    }

    function stopChallenge() {
        clearInterval(interval);
        isRunning = false;
        startBtn.innerText = "ابدأ التحدي";
        startBtn.style.background = "#06b6d4";
        alarm.pause();
        window.removeEventListener('devicemotion', handleMotion);
    }

    function updateDisplay() {
        let m = Math.floor(secondsLeft / 60);
        let s = secondsLeft % 60;
        timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function handleMotion(event) {
        let acc = event.accelerationIncludingGravity;
        let threshold = 12; // عتبة الحساسية
        let totalAcc = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

        if (totalAcc > threshold + 3 || totalAcc < threshold - 3) {
            if (alarm.paused) {
                alarm.play();
                violations++;
                document.getElementById('violations').innerText = violations;
                sendTelegram("⚠️ لقد لمست الجوال! عد للدراسة فوراً.");
            }
        } else {
            alarm.pause();
        }
    }

    function completeChallenge() {
        stopChallenge();
        let sessionMinutes = Math.floor(document.getElementById('customTime').value || 5);
        totalMinutes = parseInt(totalMinutes) + sessionMinutes;
        localStorage.setItem('totalStudy', totalMinutes);
        document.getElementById('totalStudy').innerText = totalMinutes;
        sendTelegram(`✅ أحسنت! أكملت ${sessionMinutes} دقيقة دراسة. إجمالي وقتك: ${totalMinutes} دقيقة.`);
        alert("تم التحدي بنجاح!");
    }

    function sendTelegram(msg) {
        let token = document.getElementById('token').value;
        let id = document.getElementById('chatId').value;
        if(token && id) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}`);
        }
    }
</script>
</body>
</html>
